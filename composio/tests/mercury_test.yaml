suite: test mercury knative service
templates:
  - mercury-service.yaml
tests:
  - it: should create mercury knative service when enabled
    set:
      mercury.enabled: true
      mercury.image.repository: test-mercury
      mercury.image.tag: knative-test
    asserts:
      - isKind:
          of: Service
      - isAPIVersion:
          of: serving.knative.dev/v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-composio-mercury
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: mercury

  - it: should not create mercury service when disabled
    set:
      mercury.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should have correct autoscaling annotations
    set:
      mercury.enabled: true
      mercury.autoscaling.minScale: 2
      mercury.autoscaling.maxScale: 20
      mercury.autoscaling.target: 90
    asserts:
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/minScale"]
          value: "2"
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/maxScale"]
          value: "20"
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/target"]
          value: "90"

  - it: should use default autoscaling values when not specified
    set:
      mercury.enabled: true
    asserts:
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/minScale"]
          value: "1"
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/maxScale"]
          value: "10"
      - equal:
          path: spec.template.metadata.annotations["autoscaling.knative.dev/target"]
          value: "80"

  - it: should have correct container configuration
    set:
      mercury.enabled: true
      mercury.containerConcurrency: 100
      mercury.timeoutSeconds: 600
      mercury.image.repository: test-mercury
      mercury.image.tag: v1.0.0
      mercury.image.pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containerConcurrency
          value: 100
      - equal:
          path: spec.template.spec.timeoutSeconds
          value: 600
      - equal:
          path: spec.template.spec.containers[0].image
          value: test-mercury:v1.0.0
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: should use chart app version when tag not specified
    set:
      mercury.enabled: true
      mercury.image.repository: test-mercury
      mercury.image.tag: null
    chart:
      appVersion: "2.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: test-mercury:2.0.0

  - it: should have correct port configuration
    set:
      mercury.enabled: true
      mercury.service.port: 8080
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: should have default port when not specified
    set:
      mercury.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: should have security context
    set:
      mercury.enabled: true
      mercury.securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true

  - it: should have correct environment variables
    set:
      mercury.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AWS_S3_REGION_NAME
            value: us-east-1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SELF_HOSTED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BACKEND_URL
            value: http://RELEASE-NAME-apollo:9900

  - it: should include image pull secrets when configured
    set:
      mercury.enabled: true
      global.imagePullSecrets:
        - name: mercury-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: mercury-secret

  - it: should have cluster-local visibility
    set:
      mercury.enabled: true
    asserts:
      - equal:
          path: metadata.annotations["serving.knative.dev/visibility"]
          value: cluster-local
